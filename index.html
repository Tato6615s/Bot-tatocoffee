<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIGIN COFFEE — Specialty Roastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300;1,9..144,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* --- สไตล์ดั้งเดิม --- */
:root {
  --ink: #1a1208; --brown: #3d2b0f; --caramel: #8b5e2a; --gold: #c49a3a;
  --cream: #f5ede0; --cream2: #faf5ed; --warm-white: #fefcf8;
  --border: rgba(139,94,42,0.15); --r: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: var(--ink); overflow-x: hidden; }

/* --- ส่วนที่เพิ่มใหม่: Floating Buttons --- */
.floating-contact {
  position: fixed; bottom: 25px; right: 25px; z-index: 1000;
  display: flex; flex-direction: column; gap: 12px;
}
.float-btn {
  width: 56px; height: 56px; border-radius: 50%; 
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.3s ease;
  cursor: pointer; text-decoration: none;
}
.float-btn:hover { transform: scale(1.1) translateY(-5px); }
.btn-line { background: #06C755; }
.btn-contact { background: var(--caramel); color: white; font-size: 24px; }

/* --- ปรับปรุงสไตล์ปุ่มในการ์ด --- */
.result-actions { display: flex; gap: 8px; margin-top: 15px; }
.btn-mini { 
  padding: 8px 14px; font-size: 11px; border-radius: 50px; 
  cursor: pointer; border: none; font-weight: 500; text-decoration: none;
}
.btn-mini-primary { background: var(--gold); color: var(--ink); }
.btn-mini-line { background: #06C755; color: white; }

/* --- คงสไตล์เดิมจากไฟล์ที่ให้มา --- */
/* (ส่วนนี้รวมถึงสไตล์ Nav, Hero, Finder, Catalog ที่คุณมีอยู่แล้ว) */
/* ... [ตัดส่วน Style เดิมเพื่อความกระชับ แต่ยังคงอยู่ในไฟล์จริง] ... */
</style>
</head>
<body>

<div class="floating-contact">
  <a href="https://line.me/ti/p/@yourline" target="_blank" class="float-btn btn-line" title="สั่งซื้อทาง Line">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" style="width: 32px;" alt="Line">
  </a>
  <a href="#leads" class="float-btn btn-contact" title="ติดต่อเรา">✉️</a>
</div>

<script>
// --- ฟังก์ชันที่อัพเดทใหม่: ลดขั้นตอนการคลิก ---

// 1. ปรับปรุงการแสดงผล AI Result ให้มีปุ่มสั่งซื้อทันที
function showQuizResult() {
  // ... (ส่วนการคำนวณคะแนนเดิมของคุณ) ...
  
  const rankLabels = ['เหมาะที่สุด', 'อันดับ 2', 'อันดับ 3'];
  document.getElementById('resultCards').innerHTML = ranked.map((c, i) => `
    <div class="result-card ${i===0?'rank1':''}">
      <div class="result-emoji">${c.emoji}</div>
      <div class="result-info">
        <div class="result-name">${c.name} <span class="result-rank-badge">${rankLabels[i]}</span></div>
        <div class="result-match">★ เหมาะกับคุณ</div>
        <div class="result-why">${whyText(c)}</div>
        
        <div class="result-actions">
          <button onclick="openModal(${c.id})" class="btn-mini" style="background: rgba(255,255,255,0.1); color: white;">รายละเอียด</button>
          <button onclick="quickOrder('${c.name}')" class="btn-mini btn-mini-primary">สั่งซื้อด่วน</button>
          <a href="https://line.me/ti/p/@yourline" target="_blank" class="btn-mini btn-mini-line">Line</a>
        </div>
      </div>
      <div class="result-price">฿${c.price}</div>
    </div>
  `).join('');
  
  document.getElementById('quizResult').classList.add('active');
}

// 2. ฟังก์ชันสั่งซื้อด่วน (Auto-fill & Scroll)
function quickOrder(productName) {
  // ปิด modal ถ้าเปิดอยู่
  if(typeof closeModal === 'function') closeModal();
  
  // เลื่อนไปที่ฟอร์มติดต่อ
  document.getElementById('leads').scrollIntoView({ behavior: 'smooth' });
  
  // กรอกชื่อสินค้าในช่องข้อความอัตโนมัติ
  const messageBox = document.querySelector('#leads textarea');
  if(messageBox) {
    messageBox.value = "สนใจสั่งซื้อเมล็ดกาแฟ: " + productName;
    messageBox.focus();
  }
}

// ... [คงฟังก์ชันเดิมอื่นๆ ของคุณไว้] ...
</script>
</body>
</html>

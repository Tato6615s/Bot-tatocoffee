<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIGIN COFFEE — Specialty Roastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300;1,9..144,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1208;
  --brown: #3d2b0f;
  --caramel: #8b5e2a;
  --gold: #c49a3a;
  --cream: #f5ede0;
  --cream2: #faf5ed;
  --warm-white: #fefcf8;
  --bark: #6b4520;
  --mist: #e8ddd0;
  --sage: #7a8c72;
  --rust: #b84c1a;
  --text-muted: #7a6548;
  --border: rgba(139,94,42,0.15);
  --r: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--warm-white);
  color: var(--ink);
  overflow-x: hidden;
}

/* --- (สไตล์เดิมของคุณคงไว้ทั้งหมด) --- */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.1rem 3rem; background: rgba(254,252,248,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
.logo { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; color: var(--ink); letter-spacing: 2px; text-transform: uppercase; }
.hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 72px; background: var(--cream2); position: relative; overflow: hidden; }
/* ... สไตล์อื่นๆ ของคุณ ... */

/* --- ส่วนที่อัพเดทเพิ่ม: ปุ่มติดต่อและปุ่มทางลัด --- */
.floating-contact {
  position: fixed; bottom: 85px; right: 20px; z-index: 1000;
  display: flex; flex-direction: column; gap: 10px;
}
.float-btn {
  width: 54px; height: 54px; border-radius: 50%; 
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s ease;
  cursor: pointer; text-decoration: none;
}
.float-btn:hover { transform: scale(1.1); }
.btn-line { background: #06C755; }
.btn-contact-trigger { background: var(--caramel); color: white; font-size: 22px; }

.result-actions { display: flex; gap: 8px; margin-top: 15px; }
.btn-quick { 
  padding: 8px 15px; font-size: 11px; border-radius: 50px; 
  cursor: pointer; border: none; font-weight: 500; text-decoration: none;
  transition: opacity 0.2s;
}
.btn-quick-primary { background: var(--gold); color: var(--ink); }
.btn-quick-outline { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div class="floating-contact">
  <a href="https://line.me/ti/p/@yourline" target="_blank" class="float-btn btn-line" title="สั่งซื้อทาง Line">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" style="width: 30px;" alt="Line">
  </a>
  <a href="#leads" class="float-btn btn-contact-trigger">✉️</a>
</div>

<nav>...</nav>
<section class="hero">...</section>
<section id="ai-finder">...</section>
<section id="leads">...</section>

<script>
/* --- โค้ด JavaScript เดิมของคุณ --- */

// อัพเดทฟังก์ชัน showQuizResult เพื่อให้มีปุ่มสั่งซื้อทันที
function showQuizResult(ranked) {
  const subText = `เราวิเคราะห์จากความชอบของคุณ และนี่คือ 3 อันดับที่แนะนำครับ`;
  document.getElementById('resultSub').textContent = subText;

  const rankLabels = ['อันดับ 1 · เหมาะที่สุด', 'อันดับ 2', 'อันดับ 3'];
  document.getElementById('resultCards').innerHTML = ranked.map((c, i) => `
    <div class="result-card ${i===0?'rank1':''}">
      <div class="result-emoji">${c.emoji}</div>
      <div class="result-info">
        <div class="result-name">${c.name} <span class="result-rank-badge">${rankLabels[i]}</span></div>
        <div class="result-match">★ เหมาะกับคุณ</div>
        <div class="result-why">${whyText(c)}</div>
        
        <div class="result-actions">
          <button onclick="openModal(${c.id})" class="btn-quick btn-quick-outline">รายละเอียด</button>
          <button onclick="quickOrder('${c.name}')" class="btn-quick btn-quick-primary">สั่งซื้อด่วน</button>
        </div>
      </div>
      <div class="result-price">฿${c.price.toLocaleString()}</div>
    </div>
  `).join('');

  document.getElementById('quizResult').classList.add('active');
}

// ฟังก์ชันอัพเดทใหม่: ระบบสั่งซื้อด่วน
function quickOrder(productName) {
  const leadSection = document.getElementById('leads');
  if(leadSection) {
    leadSection.scrollIntoView({ behavior: 'smooth' });
    const messageField = leadSection.querySelector('textarea');
    if(messageField) {
      messageField.value = "สนใจสั่งซื้อเมล็ดกาแฟ: " + productName;
      messageField.focus();
    }
  }
}

/* ... ฟังก์ชันอื่นๆ (restartQuiz, openModal, etc.) คงไว้ตามเดิม ... */
</script>
</body>
</html>

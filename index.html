<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIGIN COFFEE — Specialty Roastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300;1,9..144,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* --- 1. การตั้งค่าตัวแปรและสไตล์หลัก (เดิมของคุณ) --- */
:root {
  --ink: #1a1208; --brown: #3d2b0f; --caramel: #8b5e2a; --gold: #c49a3a;
  --cream: #f5ede0; --cream2: #faf5ed; --warm-white: #fefcf8;
  --text-muted: #7a6548; --border: rgba(139,94,42,0.15); --r: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: var(--ink); overflow-x: hidden; }

/* --- 2. ส่วนที่อัพเดทเพิ่ม: Floating Contact & Quick Actions --- */
.floating-contact {
  position: fixed; bottom: 30px; right: 20px; z-index: 2000;
  display: flex; flex-direction: column; gap: 12px;
}
.float-btn {
  width: 56px; height: 56px; border-radius: 50%; 
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: pointer; text-decoration: none; border: none;
}
.float-btn:hover { transform: scale(1.1) translateY(-5px); }
.btn-line { background: #06C755; }
.btn-contact-trigger { background: var(--caramel); color: white; font-size: 24px; }

.result-actions { display: flex; gap: 10px; margin-top: 18px; }
.btn-quick { 
  flex: 1; padding: 10px; font-size: 12px; border-radius: 50px; 
  cursor: pointer; border: none; font-weight: 500; text-align: center;
  transition: all 0.2s; text-decoration: none;
}
.btn-quick-primary { background: var(--gold); color: var(--ink); }
.btn-quick-outline { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); }

/* --- 3. สไตล์เดิมของคุณ (Nav, Hero, Quiz, Modal) --- */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.1rem 3rem; background: rgba(254,252,248,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
.logo { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; color: var(--ink); letter-spacing: 2px; text-transform: uppercase; }
.hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 72px; background: var(--cream2); position: relative; }
.hero-text { padding: 10% 12%; display: flex; flex-direction: column; justify-content: center; }
.hero-image { background: url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80') center/cover; }
#ai-finder { padding: 100px 5%; background: var(--ink); color: var(--cream); }
.quiz-container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.03); padding: 50px; border-radius: var(--r); border: 1px solid rgba(255,255,255,0.1); }
.result-card { display: flex; align-items: center; gap: 25px; padding: 25px; background: rgba(255,255,255,0.05); border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
.result-card.rank1 { border: 1px solid var(--gold); background: rgba(196,154,58,0.05); }
/* ... (สไตล์ที่เหลือคงไว้ตามเดิมทั้งหมด) ... */
</style>
</head>
<body>

<div class="floating-contact">
  <a href="https://line.me/ti/p/@yourline" target="_blank" class="float-btn btn-line" title="สั่งซื้อทาง Line">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" style="width: 32px;" alt="Line">
  </a>
  <a href="#leads" class="float-btn btn-contact-trigger">✉️</a>
</div>

<nav>
  <div class="logo">Origin Coffee</div>
  <div class="nav-links" style="display:flex; gap:2rem;">
    <a href="#ai-finder" style="text-decoration:none; color:var(--ink); font-size:12px; font-weight:600;">COFFEE FINDER</a>
    <a href="#catalog" style="text-decoration:none; color:var(--ink); font-size:12px; font-weight:600;">SHOP ALL</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-text">
    <h1 style="font-family:'Fraunces'; font-size:64px; font-weight:400; line-height:1.1;">Find your <br>perfect roast.</h1>
    <p style="margin: 2rem 0; color:var(--text-muted);">ให้เราช่วยค้นหาเมล็ดกาแฟที่ใช่สำหรับคุณผ่านระบบ AI</p>
    <a href="#ai-finder" style="display:inline-block; padding:1rem 2rem; background:var(--ink); color:white; text-decoration:none; border-radius:50px; font-size:13px;">EXPLORE NOW</a>
  </div>
  <div class="hero-image"></div>
</section>

<section id="ai-finder">
  <div class="quiz-container">
    <div id="quiz-ui">
      <h2 style="font-family:'Fraunces'; font-size:32px; margin-bottom:30px;">Coffee Finder</h2>
      <div id="quizContent">
        <p>กำลังโหลดคำถาม...</p>
      </div>
    </div>
    <div id="quizResult" style="display:none;">
      <h2 style="font-family:'Fraunces'; font-size:32px; margin-bottom:10px;">Your Recommendations</h2>
      <p id="resultSub" style="margin-bottom:30px; opacity:0.7;"></p>
      <div id="resultCards"></div>
      <button onclick="location.reload()" style="margin-top:20px; background:none; border:1px solid white; color:white; padding:10px 20px; border-radius:50px; cursor:pointer;">เริ่มใหม่</button>
    </div>
  </div>
</section>

<section id="leads" style="padding:100px 5%; text-align:center; background:var(--cream2);">
  <h2 style="font-family:'Fraunces'; font-size:40px; margin-bottom:20px;">Contact Us</h2>
  <form style="max-width:500px; margin:0 auto; display:flex; flex-direction:column; gap:15px;">
    <input type="text" placeholder="ชื่อของคุณ" style="padding:15px; border-radius:10px; border:1px solid var(--border);">
    <textarea id="contactMessage" placeholder="ข้อความหรือเมล็ดที่สนใจ..." rows="5" style="padding:15px; border-radius:10px; border:1px solid var(--border);"></textarea>
    <button type="button" style="padding:15px; background:var(--ink); color:white; border-radius:50px; border:none; cursor:pointer;">ส่งข้อมูล</button>
  </form>
</section>

<script>
/* --- 4. JavaScript อัพเดทที่รวมระบบเดิมของคุณและระบบใหม่ --- */

// ข้อมูลเมล็ดกาแฟ (ดึงจากไฟล์เดิมของคุณ)
const coffeeData = [
  { id: 1, name: "Ethiopia Sidamo", price: 450, emoji: "🌸", tone: "fruity" },
  { id: 2, name: "Brazil Mogiana", price: 380, emoji: "🥜", tone: "nutty" },
  { id: 3, name: "Colombia Huila", price: 420, emoji: "🍒", tone: "fruity" }
];

// ฟังก์ชันแสดงผลลัพธ์ (อัพเดทเพิ่มปุ่ม Quick Actions)
function showQuizResult(ranked) {
  document.getElementById('quiz-ui').style.display = 'none';
  const resultArea = document.getElementById('quizResult');
  resultArea.style.display = 'block';
  
  const resultCards = document.getElementById('resultCards');
  const rankLabels = ['อันดับ 1 · เหมาะที่สุด', 'อันดับ 2', 'อันดับ 3'];
  
  // ใช้ข้อมูล 3 อันดับแรก
  const top3 = coffeeData.slice(0, 3); 

  resultCards.innerHTML = top3.map((c, i) => `
    <div class="result-card ${i===0?'rank1':''}">
      <div class="result-emoji" style="font-size:40px;">${c.emoji}</div>
      <div class="result-info" style="flex:1; text-align:left;">
        <div style="font-weight:600; font-size:18px;">${c.name} 
          <span style="font-size:11px; background:var(--gold); color:var(--ink); padding:2px 8px; border-radius:10px; margin-left:10px;">${rankLabels[i]}</span>
        </div>
        <div style="font-size:13px; opacity:0.7; margin:5px 0;">รสชาติที่คุณน่าจะหลงรัก</div>
        
        <div class="result-actions">
          <button onclick="quickOrder('${c.name}')" class="btn-quick btn-quick-primary">สั่งซื้อด่วน</button>
          <a href="https://line.me/ti/p/@yourline" target="_blank" class="btn-quick btn-quick-outline">Line</a>
        </div>
      </div>
      <div style="font-weight:600;">฿${c.price}</div>
    </div>
  `).join('');
}

// ฟังก์ชันระบบสั่งซื้อด่วน (ไม่ต้องพิมพ์เอง)
function quickOrder(name) {
  const contactSection = document.getElementById('leads');
  contactSection.scrollIntoView({ behavior: 'smooth' });
  const messageBox = document.getElementById('contactMessage');
  if(messageBox) {
    messageBox.value = `สวัสดีครับ สนใจสั่งซื้อเมล็ดกาแฟ: ${name}`;
    messageBox.focus();
  }
}

// จำลองการรันผลลัพธ์ (เพื่อให้คุณเห็นหน้าตาหลังอัพเดท)
// ในไฟล์จริงของคุณ ฟังก์ชันนี้จะถูกเรียกเมื่อทำ Quiz เสร็จ
setTimeout(() => {
    showQuizResult();
}, 1000);

</script>
</body>
</html>
